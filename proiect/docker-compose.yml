version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: awbd-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: awbd_dev
      MYSQL_USER: awbd
      MYSQL_PASSWORD: awbd
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: